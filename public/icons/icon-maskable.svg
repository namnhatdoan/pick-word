<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="clip">
      <rect width="512" height="512"/>  // circle for regular
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#2A2015"/>

  <!-- Warm accent ring -->
  

  <!-- Pencil body -->
  <g transform="translate(256, 256) rotate(-35)" clip-path="url(#clip)">
    <!-- Shaft -->
    <rect x="-31.1296" y="-147.8656" width="62.2592" height="225.68959999999998"
          rx="11.6736" fill="#C4943A"/>
    <!-- Wood tip area -->
    <polygon points="-31.1296,77.82400000000001 31.1296,77.82400000000001 0,140.0832"
             fill="#D4A86A"/>
    <!-- Lead tip -->
    <polygon points="-11.6736,124.5184 11.6736,124.5184 0,155.64800000000002"
             fill="#888"/>
    <!-- Eraser -->
    <rect x="-31.1296" y="-167.3216" width="62.2592" height="31.1296"
          rx="7.7824" fill="#D46A7A"/>
    <!-- Eraser band -->
    <rect x="-31.1296" y="-147.8656" width="62.2592" height="9.728000000000002"
          fill="#A08060"/>
    <!-- Shine -->
    <rect x="-7.7824" y="-132.3008" width="11.6736" height="147.8656"
          rx="3.8912" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- "PW" wordmark at bottom -->
  <text x="256" y="450.56" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="71.68" font-weight="800" fill="#C4943A" letter-spacing="2.56">
    PW
  </text>
</svg>